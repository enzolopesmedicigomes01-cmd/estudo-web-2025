<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/classroom/favicon.png">
    <title>Portal de Pesquisa Avançada</title>
    <style>
        /* DESIGN LIMPO E RÁPIDO */
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        header { padding: 15px; background: #161b22; border-bottom: 1px solid #30363d; font-weight: bold; }
        
        .grade { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 40px; }
        
        .card { 
            width: 220px; padding: 25px; background: #21262d; 
            border: 1px solid #30363d; border-radius: 12px; cursor: pointer;
            transition: 0.2s;
        }
        .card:hover { border-color: #58a6ff; background: #30363d; transform: scale(1.05); }
        .card h3 { margin: 0; color: #58a6ff; }

        /* AREA DO JOGO - OTIMIZADA */
        #viewport { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .btn-sair { position: absolute; top: 10px; right: 10px; background: #da3633; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; z-index: 1001; border: none; }
        .btn-sair:hover { background: #f85149; }
    </style>
</head>
<body>

<header>SISTEMA DE ANÁLISE DE DADOS - VICENTE/MEDICI</header>

<div class="grade">
    <div class="card" onclick="play('https://webgl.poki.com/games/subway-surfers/index.html')">
        <h3>LAB 01: Cinética</h3>
        <p>Subway Surfers (Versão Poki)</p>
    </div>

    <div class="card" onclick="play('https://ubg77.github.io/edit/retro-bowl/')">
        <h3>LAB 02: Balística</h3>
        <p>Retro Bowl (Mirror)</p>
    </div>

    <div class="card" onclick="play('https://geometry-dash.io/game/geometry-dash-lite/')">
        <h3>LAB 03: Geometria</h3>
        <p>Geometry Dash (Turbo)</p>
    </div>

    <div class="card" onclick="play('https://1v1.lol')">
        <h3>LAB 04: Estrutura</h3>
        <p>1v1.LOL (Original)</p>
    </div>
</div>

<div id="viewport">
    <button class="btn-sair" onclick="stop()">FECHAR [X]</button>
    <iframe id="game-frame" src=""></iframe>
</div>

<script>
    function play(url) {
        const frame = document.getElementById('game-frame');
        document.getElementById('viewport').style.display = 'block';
        // Isso força o navegador a focar apenas no jogo
        frame.src = url;
        frame.focus();
    }

    function stop() {
        document.getElementById('viewport').style.display = 'none';
        document.getElementById('game-frame').src = '';
    }

    // TECLA P PARA SUMIR TUDO
    window.onkeydown = (e) => {
        if(e.key.toLowerCase() === 'p') window.location.replace('https://classroom.google.com');
    };
</script>

</body>
</html>
